<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bet Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0}
nav{display:flex;background:#222}
nav button{flex:1;padding:14px;border:none;background:#222;color:#fff;cursor:pointer}
nav button.active{background:#444}
.tab{padding:16px}
.card{background:#1d1d1d;padding:12px;margin:10px 0;border-radius:10px}
input,select,button{padding:8px;margin:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stat{background:#222;padding:10px;border-radius:8px}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #333;padding:6px}
</style>
</head>
<body>
<nav>
<button id="b1" class="active" onclick="showTab('bets')">Wetten</button>
<button id="b2" onclick="showTab('cash')">Ein/Auszahlungen</button>
</nav>

<div id="bets" class="tab">
<div class="card">
<input id="bookName" placeholder="Neuer Wettanbieter">
<button onclick="addBook()">Anbieter hinzufügen</button>
</div>

<div class="card">
<select id="betBook"></select>
<input id="stake" type="number" placeholder="Einsatz">
<input id="odds" type="number" step="0.01" placeholder="Quote">
<label><input id="tax" type="checkbox"> 5% Steuer</label>
<button onclick="addBet()">Wette speichern</button>
</div>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Offene Wetten</h3>
<div id="open"></div>
</div>

<div class="card">
<h3>Historie</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Wettprofit-Kurve</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="card">
<h3>Vermögenskurve (Cashflow + Profit)</h3>
<canvas id="bankrollChart"></canvas>
</div>
</div>

<div id="cash" class="tab" style="display:none">
<div class="card">
<select id="cashBook"></select>
<input id="amount" type="number" placeholder="Betrag">
<button onclick="deposit()">Einzahlung</button>
<button onclick="withdraw()">Auszahlung</button>
</div>

<div class="card">
<h3>Cashflow Übersicht</h3>
<table id="cashTable"></table>
</div>

<div class="card">
<h3>Cashflow Historie</h3>
<div id="cashHistory"></div>
</div>
</div>

<script>
let db=JSON.parse(localStorage.getItem("bettrackerpro")||'{"books":{},"bets":[],"cash":[]}');
function save(){localStorage.setItem("bettrackerpro",JSON.stringify(db));}
function showTab(t){
bets.style.display=t==='bets'?'block':'none';
cash.style.display=t==='cash'?'block':'none';
b1.classList.toggle('active',t==='bets');
b2.classList.toggle('active',t==='cash');
}
function addBook(){
let n=bookName.value.trim(); if(!n)return;
if(!db.books[n]) db.books[n]={};
save(); render();
}
function refreshBooks(){
betBook.innerHTML=''; cashBook.innerHTML='';
Object.keys(db.books).forEach(b=>{
betBook.innerHTML+=`<option>${b}</option>`;
cashBook.innerHTML+=`<option>${b}</option>`;
});
}
function addBet(){
db.bets.push({
id:Date.now(),book:betBook.value,
stake:+stake.value,odds:+odds.value,tax:tax.checked,
status:'open',created:new Date().toISOString()
});
save(); render();
}
function settle(id,win){
let b=db.bets.find(x=>x.id===id);
let profit=win?(b.stake*b.odds)-(b.stake):(-b.stake);
if(win && b.tax) profit-= (b.stake*b.odds)*0.05;
b.status=win?'win':'loss';
b.result=profit;
b.resolved=new Date().toISOString();
save(); render();
}
function delBet(id){db.bets=db.bets.filter(x=>x.id!==id); save(); render();}
function deposit(){
db.cash.push({id:Date.now(),book:cashBook.value,type:'in',amount:+amount.value,date:new Date().toISOString()});
save(); render();
}
function withdraw(){
db.cash.push({id:Date.now(),book:cashBook.value,type:'out',amount:+amount.value,date:new Date().toISOString()});
save(); render();
}
let pChart,bChart;
function render(){
refreshBooks();

open.innerHTML=''; history.innerHTML='';
db.bets.forEach(b=>{
if(b.status==='open'){
open.innerHTML+=`<div>${b.book} | ${b.stake}€ @ ${b.odds}
<button onclick="settle(${b.id},true)">Win</button>
<button onclick="settle(${b.id},false)">Loss</button>
<button onclick="delBet(${b.id})">Löschen</button></div>`;
}else{
history.innerHTML=`<div>${b.book} | ${b.status.toUpperCase()} | ${b.result.toFixed(2)}€
<button onclick="delBet(${b.id})">Löschen</button></div>`+history.innerHTML;
}
});

let totalIn=0,totalOut=0,totalProfit=0,wins=0,losses=0;
db.cash.forEach(c=>{if(c.type==='in')totalIn+=c.amount; else totalOut+=c.amount;});
db.bets.filter(b=>b.status!=='open').forEach(b=>{
totalProfit+=b.result;
if(b.status==='win')wins++; else losses++;
});
let week=period(7), month=period(30);
stats.innerHTML=`
<div class="stat">Einzahlungen<br>${totalIn.toFixed(2)}€</div>
<div class="stat">Auszahlungen<br>${totalOut.toFixed(2)}€</div>
<div class="stat">Netto Cashflow<br>${(totalIn-totalOut).toFixed(2)}€</div>
<div class="stat">Wettprofit<br>${totalProfit.toFixed(2)}€</div>
<div class="stat">Letzte 7 Tage<br>${week.toFixed(2)}€</div>
<div class="stat">Letzte 30 Tage<br>${month.toFixed(2)}€</div>
<div class="stat">Wins / Losses<br>${wins} / ${losses}</div>
<div class="stat">Vermögen<br>${(totalIn-totalOut+totalProfit).toFixed(2)}€</div>`;

let rows="<tr><th>Anbieter</th><th>Einz.</th><th>Ausz.</th><th>Netto</th></tr>";
Object.keys(db.books).forEach(book=>{
let i=0,o=0;
db.cash.filter(c=>c.book===book).forEach(c=>c.type==='in'?i+=c.amount:o+=c.amount);
rows+=`<tr><td>${book}</td><td>${i.toFixed(2)}</td><td>${o.toFixed(2)}</td><td>${(i-o).toFixed(2)}</td></tr>`;
});
cashTable.innerHTML=rows;

cashHistory.innerHTML="";
db.cash.slice().reverse().forEach(c=>{
cashHistory.innerHTML += `<div>${c.book} | ${c.type} | ${c.amount}€</div>`;
});

drawCharts(totalIn-totalOut);
}
function period(days){
let now=new Date();
return db.bets.filter(b=>b.status!=='open' && b.resolved).filter(b=>(now-new Date(b.resolved))/86400000<=days).reduce((s,b)=>s+b.result,0);
}
function drawCharts(netCash){
let settled=db.bets.filter(b=>b.status!=='open').sort((a,b)=>new Date(a.resolved)-new Date(b.resolved));
let labels=[], profit=[], bankroll=[];
let p=0;
settled.forEach((b,i)=>{
p+=b.result;
labels.push(i+1);
profit.push(p);
bankroll.push(netCash+p);
});
if(pChart) pChart.destroy();
if(bChart) bChart.destroy();
pChart=new Chart(document.getElementById('profitChart'),{type:'line',data:{labels,datasets:[{label:'Profit',data:profit}]}});
bChart=new Chart(document.getElementById('bankrollChart'),{type:'line',data:{labels,datasets:[{label:'Vermögen',data:bankroll}]}});
}
render();
</script>
</body>
</html>
