<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bet Tracker</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
}

input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

button {
    cursor: pointer;
}

.card {
    background: #222;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}

.win { color: #4CAF50; }
.loss { color: #f44336; }

.stats {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    background: #222;
    padding: 15px;
    border-radius: 10px;
}

.toggle {
    margin: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Bet Tracker</h1>

<div class="card">
    <input id="stake" type="number" placeholder="Einsatz" />
    <input id="odds" type="number" step="0.01" placeholder="Quote" />

    <div class="toggle">
        <label>
            <input type="checkbox" id="taxToggle">
            5% Steuer aktiv
        </label>
    </div>

    <button onclick="addWin()">✅ Gewinn</button>
    <button onclick="addLoss()">❌ Verlust</button>
</div>

<div class="stats">
    <div>
        <h3>Total Bets</h3>
        <div id="total">0</div>
    </div>
    <div>
        <h3>Wins</h3>
        <div id="wins">0</div>
    </div>
    <div>
        <h3>Losses</h3>
        <div id="losses">0</div>
    </div>
    <div>
        <h3>Profit</h3>
        <div id="profit">0</div>
    </div>
</div>

<h2>Verlauf</h2>
<div id="history"></div>

</div>

<script>

let total = 0;
let wins = 0;
let losses = 0;
let profit = 0;

function calc(stake, odds, win){

    let result = 0;

    if(win){
        result = stake * odds;

        if(document.getElementById("taxToggle").checked){
            result *= 0.95; // 5% Steuer
        }

        result -= stake; // Einsatz abziehen (nur Gewinn zählt)
    } else {
        result = -stake;
    }

    return result;
}

function addWin(){

    let stake = parseFloat(document.getElementById("stake").value);
    let odds = parseFloat(document.getElementById("odds").value);

    if(!stake || !odds) return;

    let result = calc(stake, odds, true);

    updateStats(result, true, stake, odds);
}

function addLoss(){

    let stake = parseFloat(document.getElementById("stake").value);

    if(!stake) return;

    let result = calc(stake, 0, false);

    updateStats(result, false, stake, 0);
}

function updateStats(result, win, stake, odds){

    total++;

    if(win){
        wins++;
    } else {
        losses++;
    }

    profit += result;

    document.getElementById("total").innerText = total;
    document.getElementById("wins").innerText = wins;
    document.getElementById("losses").innerText = losses;
    document.getElementById("profit").innerText = profit.toFixed(2);

    addHistory(win, stake, odds, result);
}

function addHistory(win, stake, odds, result){

    let div = document.createElement("div");
    div.className = "card " + (win ? "win" : "loss");

    div.innerHTML = `
        ${win ? "WIN" : "LOSS"} | 
        Einsatz: ${stake} | 
        Quote: ${odds} | 
        Ergebnis: ${result.toFixed(2)}
    `;

    document.getElementById("history").prepend(div);
}

</script>

</body>
</html>
